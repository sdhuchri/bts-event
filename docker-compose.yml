name: bts-event

services:
  backend:
    build: ./backend
    container_name: bts-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    # Postgres berjalan di host (container nalarx-dashboard, published :5432).
    # host.docker.internal -> host gateway (juga jalan di Linux via host-gateway).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Hot reload kode backend tanpa rebuild.
      - ./backend/app:/app/app
    depends_on:
      - wa-gateway
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  wa-gateway:
    build: ./wa-gateway
    container_name: bts-wa-gateway
    restart: unless-stopped
    environment:
      - PORT=3000
      - WA_API_KEY=bts-wa-secret-key
      - WA_AUTH_DIR=/app/auth
      # Daftar nomor pengirim (round-robin + failover). Tambah/kurang sesuai kebutuhan.
      - WA_SESSIONS=wa1,wa2
    ports:
      # Buka http://localhost:8090/qr?key=bts-wa-secret-key untuk scan WhatsApp.
      - "8090:3000"
    volumes:
      # Persist sesi WhatsApp (Baileys) agar tak perlu scan QR tiap restart.
      - wa_auth:/app/auth

  frontend:
    build: ./frontend
    container_name: bts-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    ports:
      - "3002:3002"
    depends_on:
      - backend
    # Lokal: paksa mode dev (hot reload). Image default-nya production (next start).
    command: ["npm", "run", "dev"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  wa_auth:
